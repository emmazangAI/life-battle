<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life ⬡ 六边形多种族对战</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --fg: #ffffff;
      --grid: #1a1a1a;
      --team-a: #ff6b9d;
      --team-b: #00ff88;
      --accent: #4a4a4a;
      --font: 'JetBrains Mono', monospace;
    }

    body { font-family: var(--font); background: var(--bg); color: var(--fg); overflow: hidden; cursor: crosshair; }
    #canvas { display: block; width: 100vw; height: 100vh; background: var(--bg); }

    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 48px;
      background: rgba(10,10,10,0.9); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--grid);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; z-index: 1000; font-size: 13px; letter-spacing: 0.5px;
    }
    .title { font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
    .stats { display: flex; gap: 32px; align-items: center; }
    .stat-item { display: flex; align-items: center; gap: 8px; }
    .stat-label { color: #666; font-size: 11px; text-transform: uppercase; }
    .stat-value { font-weight: 600; font-variant-numeric: tabular-nums; }
    .team-indicator { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
    .team-a { background: var(--team-a); }
    .team-b { background: var(--team-b); }
    .team-c { background: #4da6ff; }

    .control-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
      background: rgba(10,10,10,0.9); backdrop-filter: blur(10px);
      border-top: 1px solid var(--grid);
      display: flex; align-items: center; justify-content: center; gap: 16px;
      padding: 0 24px; z-index: 1000;
    }

    button {
      background: transparent; border: 1px solid var(--accent); color: var(--fg);
      padding: 10px 20px; font-family: var(--font); font-size: 12px;
      text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
      transition: all 0.2s; font-weight: 500;
    }
    button:hover { background: var(--accent); border-color: var(--fg); }
    button.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
    button.primary { background: var(--team-a); color: var(--bg); border-color: var(--team-a); font-weight: 600; }
    button.primary:hover { background: #00cc66; border-color: #00cc66; }

    .speed-control { display: flex; align-items: center; gap: 12px; margin-left: 32px; padding-left: 32px; border-left: 1px solid var(--grid); }
    .speed-label { font-size: 11px; color: #666; text-transform: uppercase; }
    input[type="range"] { width: 120px; height: 2px; background: var(--accent); outline: none; -webkit-appearance: none; cursor: pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--fg); cursor: pointer; border: none; }
    .speed-value { font-variant-numeric: tabular-nums; font-size: 12px; min-width: 50px; }

    .lang-btn { margin-left: 16px; padding: 6px 12px; background: transparent; border: 1px solid var(--accent); color: var(--fg); font-family: var(--font); font-size: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .lang-btn:hover { background: var(--accent); border-color: var(--fg); }

    .race-select-control { display: flex; align-items: center; gap: 12px; margin-left: 32px; padding-left: 32px; border-left: 1px solid var(--grid); }
    .race-btn { padding: 8px 16px; background: transparent; border: 1px solid var(--accent); color: var(--fg); font-family: var(--font); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
    .race-btn:hover { background: var(--accent); border-color: var(--fg); }
    .race-btn.active[data-race="1"], .race-btn.race-a.active { background: var(--team-a); color: var(--bg); border-color: var(--team-a); }
    .race-btn.active[data-race="2"], .race-btn.race-b.active { background: var(--team-b); color: var(--bg); border-color: var(--team-b); }
    .race-btn.race-c.active { background: #4da6ff; color: var(--bg); border-color: #4da6ff; }
    .race-btn.race-d.active { background: #ffffff; color: var(--bg); border-color: #ffffff; }
    .race-btn.race-add { font-size: 16px; padding: 8px 12px; }

    /* 图案库面板 */
    .pattern-panel {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      width: 520px; max-height: calc(100vh - 160px); overflow-y: auto;
      background: rgba(15,15,15,0.95); backdrop-filter: blur(10px);
      border: 1px solid var(--accent); border-radius: 8px; padding: 16px;
      z-index: 1500; display: none; animation: fadeIn 0.2s ease;
    }
    .pattern-panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .pattern-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .pattern-panel-title { font-size: 14px; font-weight: 600; letter-spacing: 1px; }
    .pattern-panel-close { background: transparent; border: none; color: #666; font-size: 18px; cursor: pointer; padding: 4px 8px; }
    .pattern-panel-close:hover { color: var(--fg); background: transparent; border: none; }
    .pattern-panel-section { margin-bottom: 16px; }
    .pattern-section-title { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .pattern-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .pattern-item { padding: 10px 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--accent); border-radius: 4px; cursor: pointer; transition: all 0.2s; font-size: 12px; text-align: center; }
    .pattern-item:hover { border-color: var(--team-a); background: rgba(255,107,157,0.1); }
    .pattern-item.selected { border-color: var(--team-a); background: rgba(255,107,157,0.15); }
    .pattern-item.stamp-active { border-color: var(--fg); background: rgba(255,255,255,0.15); box-shadow: 0 0 0 2px var(--fg); }

    /* 六边形规则说明 */
    .hex-badge {
      position: fixed; top: 56px; left: 24px;
      background: rgba(15,15,15,0.9); border: 1px solid var(--accent);
      border-radius: 6px; padding: 8px 14px; font-size: 11px; color: #888;
      z-index: 999;
    }
    .hex-badge strong { color: var(--fg); }

    @media (max-width: 768px) {
      .top-bar, .control-bar { font-size: 11px; padding: 0 12px; }
      .stats { gap: 16px; }
      .control-bar { flex-wrap: wrap; height: auto; padding: 12px; }
      .speed-control { margin-left: 0; padding-left: 0; border-left: none; width: 100%; justify-content: center; }
      .hex-badge { display: none; }
    }
  </style>
</head>
<body>
  <!-- 顶部信息栏 -->
  <div class="top-bar">
    <div class="title">⬡ LIFE — 六边形对战</div>
    <div class="stats">
      <div class="stat-item">
        <span class="stat-label" data-i18n="gen">代数</span>
        <span class="stat-value" id="generation">0</span>
      </div>
      <div class="stat-item">
        <span class="team-indicator team-a"></span>
        <span class="stat-value" id="team-a-count">0</span>
      </div>
      <div class="stat-item">
        <span class="team-indicator team-b"></span>
        <span class="stat-value" id="team-b-count">0</span>
      </div>
      <div class="stat-item">
        <span class="team-indicator team-c"></span>
        <span class="stat-value" id="team-c-count">0</span>
      </div>
      <button id="btn-lang" class="lang-btn" title="切换语言">EN</button>
    </div>
  </div>

  <!-- 规则说明 -->
  <div class="hex-badge">⬡ 规则 <strong>B2/S34</strong> · 6邻居 · 2繁殖 · 3-4存活</div>

  <!-- Canvas -->
  <canvas id="canvas"></canvas>

  <!-- 底部控制栏 -->
  <div class="control-bar">
    <button id="btn-start" class="primary" data-i18n="start">开始</button>
    <button id="btn-pause" data-i18n="pause">暂停</button>
    <button id="btn-reset" data-i18n="reset">重置</button>
    <button id="btn-clear" data-i18n="clear">清空</button>

    <div class="speed-control">
      <span class="speed-label" data-i18n="speed">速度</span>
      <input type="range" id="slider-speed" min="50" max="1000" value="200" step="50">
      <span class="speed-value" id="speed-value">200ms</span>
    </div>

    <div class="race-select-control">
      <button id="btn-race-1" class="race-btn race-a active" data-race="1">种族A</button>
      <button id="btn-race-2" class="race-btn race-b" data-race="2">种族B</button>
      <button id="btn-race-3" class="race-btn race-c" data-race="3" style="display:none;">种族C</button>
      <button id="btn-race-4" class="race-btn race-d" data-race="4" style="display:none;">种族D</button>
      <button id="btn-add-race" class="race-btn race-add" title="添加种族">＋</button>
    </div>
  </div>

  <!-- 图案库面板 -->
  <div class="pattern-panel" id="pattern-panel">
    <div class="pattern-panel-header">
      <span class="pattern-panel-title" id="pattern-panel-title">选择图案</span>
      <button class="pattern-panel-close" id="pattern-panel-close">✕</button>
    </div>
    <div class="pattern-panel-section">
      <div class="pattern-section-title">🐾 动物</div>
      <div class="pattern-grid" id="pattern-grid-animal"></div>
    </div>
    <div class="pattern-panel-section">
      <div class="pattern-section-title">🎮 经典图案</div>
      <div class="pattern-grid" id="pattern-grid-classic"></div>
    </div>
  </div>

  <script src="hex-grid.js"></script>
  <script src="patterns.js"></script>
  <script src="main.js"></script>
</body>
</html>
