<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life 🧊 3D 多种族对战</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0a; --fg: #ffffff; --grid: #1a1a1a; --team-a: #ff6b9d; --team-b: #00ff88; --accent: #4a4a4a; --font: 'JetBrains Mono', monospace; }
    body { font-family: var(--font); background: var(--bg); color: var(--fg); overflow: hidden; }
    #canvas { display: block; width: 100vw; height: 100vh; background: var(--bg); }

    .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--grid); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 1000; font-size: 13px; }
    .title { font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
    .stats { display: flex; gap: 24px; align-items: center; }
    .stat-item { display: flex; align-items: center; gap: 8px; }
    .stat-label { color: #666; font-size: 11px; text-transform: uppercase; }
    .stat-value { font-weight: 600; font-variant-numeric: tabular-nums; }
    .team-indicator { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
    .team-a { background: var(--team-a); }
    .team-b { background: var(--team-b); }
    .team-c { background: #4da6ff; }

    .control-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--grid); display: flex; align-items: center; justify-content: center; gap: 12px; padding: 0 16px; z-index: 1000; }
    button { background: transparent; border: 1px solid var(--accent); color: var(--fg); padding: 8px 16px; font-family: var(--font); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
    button:hover { background: var(--accent); border-color: var(--fg); }
    button.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
    button.primary { background: var(--team-a); color: var(--bg); border-color: var(--team-a); font-weight: 600; }

    .speed-control { display: flex; align-items: center; gap: 8px; padding-left: 16px; border-left: 1px solid var(--grid); }
    .speed-label { font-size: 10px; color: #666; text-transform: uppercase; }
    input[type="range"] { width: 80px; height: 2px; background: var(--accent); outline: none; -webkit-appearance: none; cursor: pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--fg); cursor: pointer; border: none; }
    .speed-value { font-variant-numeric: tabular-nums; font-size: 11px; min-width: 40px; }

    /* 层切片控制 */
    .slice-control { display: flex; align-items: center; gap: 8px; padding-left: 16px; border-left: 1px solid var(--grid); }
    .slice-btn { padding: 6px 10px; font-size: 14px; min-width: 32px; text-align: center; }
    .slice-display { font-size: 11px; min-width: 50px; text-align: center; color: #888; }

    /* 规则徽章 */
    .rule-badge { position: fixed; top: 56px; left: 24px; background: rgba(15,15,15,0.9); border: 1px solid var(--accent); border-radius: 6px; padding: 8px 14px; font-size: 11px; color: #888; z-index: 999; }
    .rule-badge strong { color: var(--fg); }

    @media (max-width: 768px) {
      .top-bar { height: 40px; padding: 0 8px; font-size: 10px; }
      .title { font-size: 11px; }
      .stats { gap: 10px; }
      .control-bar { flex-wrap: wrap; height: auto; padding: 8px; gap: 6px; }
      .control-bar button { padding: 6px 10px; font-size: 9px; }
      .speed-control { padding-left: 8px; border-left: none; width: 100%; justify-content: center; }
      .slice-control { padding-left: 0; border-left: none; }
      .rule-badge { display: none; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="title">🧊 LIFE — 3D 对战</div>
    <div class="stats">
      <div class="stat-item"><span class="stat-label">代数</span><span class="stat-value" id="generation">0</span></div>
      <div class="stat-item"><span class="team-indicator team-a"></span><span class="stat-value" id="team-a-count">0</span></div>
      <div class="stat-item"><span class="team-indicator team-b"></span><span class="stat-value" id="team-b-count">0</span></div>
      <div class="stat-item"><span class="team-indicator team-c"></span><span class="stat-value" id="team-c-count">0</span></div>
    </div>
  </div>

  <div class="rule-badge">🧊 规则 <strong>B5/S45</strong> · 26邻居 · 3D立方体 · 滚轮缩放</div>

  <canvas id="canvas"></canvas>

  <div class="control-bar">
    <button id="btn-start" class="primary">开始</button>
    <button id="btn-pause">暂停</button>
    <button id="btn-reset">重置</button>
    <button id="btn-clear">清空</button>

    <div class="slice-control">
      <span class="speed-label">层</span>
      <button id="btn-slice-down" class="slice-btn">▼</button>
      <span class="slice-display" id="slice-display">全部</span>
      <button id="btn-slice-up" class="slice-btn">▲</button>
      <button id="btn-slice-all" class="slice-btn">⊡</button>
    </div>

    <div class="speed-control">
      <span class="speed-label">速度</span>
      <input type="range" id="slider-speed" min="100" max="2000" value="500" step="100">
      <span class="speed-value" id="speed-value">500ms</span>
    </div>
  </div>

  <script src="grid3d.js"></script>
  <script src="iso-renderer.js"></script>
  <script src="main.js"></script>
</body>
</html>
