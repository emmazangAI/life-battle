<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life - 兔子 vs 猫 🐰🐱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --fg: #ffffff;
      --grid: #1a1a1a;
      --team-a: #ff6b9d;  /* 兔子 - 粉色 */
      --team-b: #00ff88;  /* 乌龟 - 绿色 */
      --accent: #4a4a4a;
      --font: 'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      cursor: crosshair;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
    }

    /* 顶部信息栏 */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--grid);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    .title {
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .stats {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-label {
      color: #666;
      font-size: 11px;
      text-transform: uppercase;
    }

    .stat-value {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .team-indicator {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      display: inline-block;
    }

    .team-a { background: var(--team-a); }
    .team-b { background: var(--team-b); }

    /* 底部控制栏 */
    .control-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--grid);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 24px;
      z-index: 1000;
    }

    button {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--fg);
      padding: 10px 20px;
      font-family: var(--font);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    button:hover {
      background: var(--accent);
      border-color: var(--fg);
    }

    button.active {
      background: var(--fg);
      color: var(--bg);
      border-color: var(--fg);
    }

    button.primary {
      background: var(--team-a);
      color: var(--bg);
      border-color: var(--team-a);
      font-weight: 600;
    }

    button.primary:hover {
      background: #00cc66;
      border-color: #00cc66;
    }

    /* 速度滑块 */
    .speed-control {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: 32px;
      padding-left: 32px;
      border-left: 1px solid var(--grid);
    }

    .speed-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
    }

    input[type="range"] {
      width: 120px;
      height: 2px;
      background: var(--accent);
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: var(--fg);
      cursor: pointer;
      border: none;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: var(--team-a);
    }

    .speed-value {
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      min-width: 50px;
    }

    /* 语言切换按钮 */
    .lang-btn {
      margin-left: 16px;
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--fg);
      font-family: var(--font);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn:hover {
      background: var(--accent);
      border-color: var(--fg);
    }

    /* 种族选择 */
    .race-select-control {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: 32px;
      padding-left: 32px;
      border-left: 1px solid var(--grid);
    }

    .race-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--fg);
      font-family: var(--font);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .race-btn:hover {
      background: var(--accent);
      border-color: var(--fg);
    }

    .race-btn.active[data-race="1"] {
      background: var(--team-a);
      color: var(--bg);
      border-color: var(--team-a);
    }

    .race-btn.active[data-race="2"] {
      background: var(--team-b);
      color: var(--bg);
      border-color: var(--team-b);
    }

    /* 初始加载提示 */
    .intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10, 10, 10, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    .intro-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .intro-title {
      font-size: 48px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 4px;
    }

    .intro-subtitle {
      font-size: 16px;
      color: #666;
      margin-bottom: 48px;
      letter-spacing: 2px;
    }

    .intro-teams {
      display: flex;
      gap: 64px;
      margin-bottom: 48px;
    }

    .intro-team {
      text-align: center;
    }

    .intro-emoji {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .intro-team-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .team-a-name { color: var(--team-a); }
    .team-b-name { color: var(--team-b); }

    .intro-team-desc {
      font-size: 12px;
      color: #666;
    }

    .intro-start-btn {
      background: var(--fg);
      color: var(--bg);
      border: none;
      padding: 16px 48px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .intro-start-btn:hover {
      background: var(--team-a);
      transform: scale(1.05);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .top-bar, .control-bar {
        font-size: 11px;
        padding: 0 12px;
      }

      .stats {
        gap: 16px;
      }

      .control-bar {
        flex-wrap: wrap;
        height: auto;
        padding: 12px;
      }

      .speed-control {
        margin-left: 0;
        padding-left: 0;
        border-left: none;
        width: 100%;
        justify-content: center;
      }

      .intro-title {
        font-size: 32px;
      }

      .intro-teams {
        gap: 32px;
      }

      .intro-emoji {
        font-size: 48px;
      }
    }
  </style>
</head>
<body>
  <!-- 初始加载画面 -->
  <div class="intro-overlay" id="intro-overlay">
    <div class="intro-title">LIFE</div>
    <div class="intro-subtitle" data-i18n="subtitle">康威生命游戏 - 对战模式</div>
    
    <div class="intro-teams">
      <div class="intro-team">
        <div class="intro-emoji">🐰</div>
        <div class="intro-team-name team-a-name" data-i18n="team-rabbit">兔子队</div>
        <div class="intro-team-desc" data-i18n="team-a-color">粉色阵营</div>
      </div>
      
      <div class="intro-team">
        <div class="intro-emoji">🐢</div>
        <div class="intro-team-name team-b-name" data-i18n="team-turtle">乌龟队</div>
        <div class="intro-team-desc" data-i18n="team-b-color">绿色阵营</div>
      </div>
    </div>
    
    <button class="intro-start-btn" id="intro-start-btn" data-i18n="start-game">开始游戏</button>
  </div>

  <!-- 顶部信息栏 -->
  <div class="top-bar">
    <div class="title">🐰 vs 🐢</div>
    
    <div class="stats">
      <div class="stat-item">
        <span class="stat-label" data-i18n="gen">代数</span>
        <span class="stat-value" id="generation">0</span>
      </div>
      
      <div class="stat-item">
        <span class="team-indicator team-a"></span>
        <span class="stat-value" id="team-a-count">0</span>
      </div>
      
      <div class="stat-item">
        <span class="team-indicator team-b"></span>
        <span class="stat-value" id="team-b-count">0</span>
      </div>
      
      <!-- 语言切换 -->
      <button id="btn-lang" class="lang-btn" title="切换语言 / Switch Language">EN</button>
    </div>
  </div>

  <!-- Canvas -->
  <canvas id="canvas"></canvas>

  <!-- 底部控制栏 -->
  <div class="control-bar">
    <button id="btn-start" class="primary" data-i18n="start">开始</button>
    <button id="btn-pause" data-i18n="pause">暂停</button>
    <button id="btn-reset" data-i18n="reset">重置</button>
    <button id="btn-clear" data-i18n="clear">清空</button>
    
    <div class="speed-control">
      <span class="speed-label" data-i18n="speed">速度</span>
      <input type="range" id="slider-speed" min="50" max="1000" value="200" step="50">
      <span class="speed-value" id="speed-value">200ms</span>
    </div>
    
    <!-- 种族选择 -->
    <div class="race-select-control">
      <span class="speed-label" data-i18n="draw">绘制</span>
      <button id="btn-race-1" class="race-btn active" data-race="1" data-i18n="rabbit">🐰 兔子</button>
      <button id="btn-race-2" class="race-btn" data-race="2" data-i18n="turtle">🐢 乌龟</button>
    </div>
  </div>

  <script src="animals.js"></script>
  <script src="../src/cell-multi.js"></script>
  <script src="main-battle.js"></script>
</body>
</html>
